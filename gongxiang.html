<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共享出行渗透率 · 叙事风格折线图</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0E2732;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .chart-card {
            width: 100%;
            max-width: 780px;
            background: rgba(14, 39, 49, 0.85);
            border: 1px solid rgba(40, 100, 221, 0.4);
            box-shadow: inset 0 0 14px rgba(40, 100, 221, 0.15), 0 10px 25px rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            padding: 24px 24px 18px 24px;
            backdrop-filter: blur(6px);
            transition: border 0.3s;
            position: relative;
        }

        .chart-card:hover {
            border-color: rgba(40, 100, 221, 0.8);
        }

        .box-corner {
            position: absolute;
            width: 14px;
            height: 14px;
        }
        .lt {
            border-left: 3px solid #2864DD;
            border-top: 3px solid #2864DD;
            top: -2px;
            left: -2px;
        }
        .rt {
            border-right: 3px solid #FCE801;
            border-top: 3px solid #FCE801;
            top: -2px;
            right: -2px;
        }
        .lb {
            border-left: 3px solid #48EA76;
            border-bottom: 3px solid #48EA76;
            bottom: -2px;
            left: -2px;
        }
        .rb {
            border-right: 3px solid #2864DD;
            border-bottom: 3px solid #2864DD;
            bottom: -2px;
            right: -2px;
        }

        .chart-title {
            font-size: 15px;
            color: #ffffff;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
        }

        .chart-container {
            width: 100%;
            height: 340px;
        }

        .custom-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 11px;
            color: #8fa1cc;
            letter-spacing: 0.3px;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            margin-right: 6px;
            background: #48EA76;
            box-shadow: 0 0 8px rgba(72, 234, 118, 0.3);
        }

        @media (max-width: 600px) {
            .chart-card {
                padding: 16px 12px 12px 12px;
            }
            .chart-title {
                font-size: 13px;
                padding-bottom: 6px;
                margin-bottom: 10px;
            }
            .chart-container {
                height: 260px;
            }
            .custom-legend {
                gap: 14px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="chart-card">
        <div class="box-corner lt"></div>
        <div class="box-corner rt"></div>
        <div class="box-corner lb"></div>
        <div class="box-corner rb"></div>

        <div class="chart-title">我国共享出行渗透率 (2017-2025)</div>

        <div id="shareLineChart" class="chart-container"></div>

        <div class="custom-legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #48EA76; box-shadow: 0 0 8px rgba(72,234,118,0.4);"></div>
                共享出行渗透率
            </div>
            <div class="legend-item" style="color: rgba(196,198,241,0.3); font-size: 10px;">
                ▲ 数据来源：行业报告 / 叙事可视化
            </div>
        </div>
    </div>

    <script>
        (function() {
            const years = ['2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'];
            const penetration = [3.4, 3.9, 3.9, 4.1, 4.8, 5.5, 6.2, 7.2, 8.1];

            const chartDom = document.getElementById('shareLineChart');
            const myChart = echarts.init(chartDom);

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(4, 18, 66, 0.95)',
                    borderColor: '#2864DD',
                    borderWidth: 1,
                    textStyle: { color: '#ffffff', fontSize: 12 },
                    formatter: function(params) {
                        const p = params[0];
                        return `<div style="font-weight:600">${p.axisValue}</div>
                                <div style="color:#C4C6F1;margin-top:4px">渗透率：<span style="color:#48EA76;font-weight:bold;">${p.value}%</span></div>`;
                    }
                },
                grid: {
                    left: '5%',
                    right: '6%',
                    bottom: '8%',
                    top: '8%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: years,
                    axisLabel: {
                        color: '#8fa1cc',
                        fontSize: 11,
                        fontWeight: '400'
                    },
                    axisLine: {
                        lineStyle: { color: 'rgba(40, 100, 221, 0.3)' }
                    },
                    axisTick: {
                        lineStyle: { color: 'rgba(40, 100, 221, 0.2)' }
                    },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    name: '渗透率 %',
                    nameTextStyle: {
                        color: '#8fa1cc',
                        fontSize: 11,
                        padding: [0, 30, 0, 0]
                    },
                    min: 2,
                    max: 9,
                    splitLine: {
                        lineStyle: {
                            color: 'rgba(255,255,255,0.06)',
                            type: 'solid'
                        }
                    },
                    axisLabel: {
                        color: '#8fa1cc',
                        fontSize: 10
                    },
                    axisLine: {
                        lineStyle: { color: 'rgba(40, 100, 221, 0.2)' }
                    }
                },
                series: [{
                    name: '共享出行渗透率',
                    type: 'line',
                    data: penetration,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 7,
                    lineStyle: {
                        color: '#48EA76',
                        width: 3,
                        shadowBlur: 12,
                        shadowColor: 'rgba(72, 234, 118, 0.5)'
                    },
                    itemStyle: {
                        color: '#48EA76',
                        borderColor: '#0E2732',
                        borderWidth: 1
                    },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(72, 234, 118, 0.35)' },
                            { offset: 0.6, color: 'rgba(72, 234, 118, 0.08)' },
                            { offset: 1, color: 'rgba(72, 234, 118, 0)' }
                        ])
                    },
                    emphasis: {
                        focus: 'series',
                        lineStyle: {
                            width: 4,
                            shadowBlur: 20,
                            shadowColor: 'rgba(72, 234, 118, 0.7)'
                        }
                    },
                    label: {
                        show: true,
                        position: 'top',
                        color: '#C4C6F1',
                        fontSize: 10,
                        fontWeight: '500',
                        formatter: (params) => `${params.value}%`
                    }
                }]
            };

            myChart.setOption(option);

            window.addEventListener('resize', () => {
                myChart.resize();
            });

            if (window.ResizeObserver) {
                const card = document.querySelector('.chart-card');
                const ro = new ResizeObserver(() => { myChart.resize(); });
                ro.observe(card);
            }
        })();
    </script>
</body>
</html>
