<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>呼吸之间 - 中国空气污染可视化</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            background: #0E2732;
            color: #fff;
        }

        /* ========== 第一页：引导页 ========== */
        .intro-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #030d30 0%, #0E2732 50%, #0a2c42 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .intro-section.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .intro-content {
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        .intro-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #c5eef0 0%, #48EA76 50%, #26c2b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.1em;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
            text-shadow: 0 0 30px rgba(72, 234, 118, 0.35);
        }

        .intro-subtitle {
            font-size: 1.25rem;
            color: #8fa1cc;
            line-height: 1.8;
            margin-bottom: 3rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.3s forwards;
        }

        .intro-text {
            font-size: 1rem;
            color: #c5eef0;
            line-height: 2;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        .start-btn {
            padding: 1rem 3rem;
            font-size: 1.1rem;
            background: linear-gradient(135deg, rgba(72, 234, 118, 0.22) 0%, rgba(38, 194, 184, 0.22) 100%);
            border: 1.5px solid rgba(72, 234, 118, 0.6);
            border-radius: 50px;
            color: #48EA76;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            letter-spacing: 0.2em;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(72, 234, 118, 0.18), inset 0 0 20px rgba(72, 234, 118, 0.06);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease 0.9s forwards;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            border-color: rgba(72, 234, 118, 0.9);
            box-shadow: 0 20px 60px rgba(72, 234, 118, 0.32), inset 0 0 30px rgba(72, 234, 118, 0.12);
        }

        .start-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(72, 234, 118, 0.25) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .start-btn:hover::after {
            opacity: 1;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 引导页星空粒子 */
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .particle-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(38, 194, 184, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(38, 194, 184, 0.4);
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(100px);
                opacity: 0;
            }
        }

        /* ========== 第二页：雾霾页面 ========== */
        .home-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0E2732;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }

        .home-page.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ---- 雾霾纹理 ---- */
        .fog-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .fog-img {
            position: absolute;
            width: 200%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><filter id="f"><feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="5" seed="1"/><feColorMatrix type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.35 0 0 0 0 0.42 0 0 0 1 0"/></filter><rect width="100%" height="100%" filter="url(%23f)" opacity="0.85"/></svg>') repeat;
            background-size: 50% 100%;
            animation: fogMove 60s linear infinite;
            opacity: 0.85;
        }

        .fog-img:nth-child(2) {
            animation: fogMove 40s linear infinite reverse;
            opacity: 0.55;
            top: 20%;
        }

        .fog-img:nth-child(3) {
            animation: fogMove 80s linear infinite;
            opacity: 0.35;
            top: -20%;
        }

        @keyframes fogMove {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        /* ---- 内容层 ---- */
        .home-content {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .home-content .clear-fog-btn {
            pointer-events: auto;
        }

        .home-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 4rem;
            font-weight: 900;
            /* 改为灰色 */
            color: #cbd5e1;
            text-shadow: 0 0 40px rgba(203, 213, 225, 0.25), 0 4px 40px rgba(0, 0, 0, 0.7);
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
        }

        .home-subtitle {
            font-size: 1.2rem;
            color: #8fa1cc;
            margin-bottom: 3rem;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
        }

        .clear-fog-btn {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            background: rgba(3, 13, 48, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(72, 234, 118, 0.45);
            border-radius: 50px;
            color: #48EA76;
            cursor: pointer;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            letter-spacing: 0.15em;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(72, 234, 118, 0.05);
        }

        .clear-fog-btn:hover {
            background: rgba(72, 234, 118, 0.12);
            border-color: rgba(72, 234, 118, 0.8);
            transform: scale(1.05);
            box-shadow: 0 0 80px rgba(72, 234, 118, 0.25);
        }

        .clear-fog-btn.clearing {
            animation: pulse 1s ease infinite;
            pointer-events: none;
            border-color: #26c2b8;
            box-shadow: 0 0 60px rgba(38, 194, 184, 0.4);
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ---- 驱散风线（白色） ---- */
        .clear-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 500;
        }

        .wind-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            animation: windBlow 0.8s ease-out forwards;
            opacity: 0;
            border-radius: 2px;
        }

        @keyframes windBlow {
            0% {
                opacity: 0;
                transform: translateX(-100%) scaleX(0.5);
            }
            40% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(100vw) scaleX(2);
            }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .intro-title {
                font-size: 2rem;
            }
            .home-title {
                font-size: 2.5rem;
            }
            .home-subtitle {
                font-size: 1rem;
            }
            .clear-fog-btn {
                padding: 0.9rem 2rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .home-title {
                font-size: 1.8rem;
            }
            .home-subtitle {
                font-size: 0.85rem;
            }
            .clear-fog-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 引导页 ===== -->
    <div class="intro-section" id="introPage">
        <div class="particles" id="particles"></div>
        <div class="intro-content">
            <h1 class="intro-title">呼吸的警报</h1>
            <p class="intro-subtitle">中国空气污染可视化交互探索</p>
            <div class="intro-text">
                <p>每一口呼吸，都是生命与环境的对话。</p>
                <p>PM2.5，这个直径不足头发丝1/20的微小颗粒，正悄然影响着3亿中国城市居民的健康。从2015年"大气十条"到2025年的今天，我们经历了什么？改变了什么？</p>
                <p>点击开始，穿越雾霾，看清真相。</p>
            </div>
            <button class="start-btn" onclick="startExplore()">开始探索</button>
        </div>
    </div>

    <!-- ===== 雾霾页面 ===== -->
    <div class="home-page" id="homePage">
        <div class="fog-container">
            <div class="fog-img"></div>
            <div class="fog-img"></div>
            <div class="fog-img"></div>
        </div>
        <div class="home-content">
            <h1 class="home-title">看不清的世界</h1>
            <p class="home-subtitle">PM2.5 浓度超过 75μg/m³ 时，能见度将降至 10 公里以下</p>
            <button class="clear-fog-btn" id="clearFogBtn" onclick="clearFog()">
                <span>点击驱散雾霾</span>
            </button>
        </div>
    </div>

    <!-- 风线动画容器 -->
    <div class="clear-animation" id="clearAnimation"></div>

    <script>
        // 引导页星空粒子
        (function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'particle-star';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 20 + 's';
                star.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(star);
            }
        })();

        // 引导页 → 雾霾页
        function startExplore() {
            const intro = document.getElementById('introPage');
            intro.classList.add('hidden');
            setTimeout(() => intro.style.display = 'none', 1200);
        }

        // 点击驱散雾霾 —— 1秒内完成风线 + 淡出 + 跳转
        let isClearing = false;

        function clearFog() {
            const btn = document.getElementById('clearFogBtn');
            const anim = document.getElementById('clearAnimation');

            if (isClearing) return;
            isClearing = true;

            btn.classList.add('clearing');
            btn.innerHTML = '<span>正在驱散...</span>';

            // 生成风线：12条，间隔40ms，总生成0.44秒
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const wind = document.createElement('div');
                    wind.className = 'wind-line';
                    wind.style.top = (Math.random() * 100) + '%';
                    wind.style.left = '0';
                    wind.style.width = (150 + Math.random() * 400) + 'px';
                    wind.style.animationDelay = (Math.random() * 0.3) + 's';
                    wind.style.opacity = 0.3 + Math.random() * 0.5;
                    anim.appendChild(wind);
                    setTimeout(() => wind.remove(), 1200);
                }, i * 40);
            }

            // 0.5秒后开始淡出页面
            setTimeout(() => {
                const home = document.getElementById('homePage');
                home.classList.add('hidden');
            }, 500);

            // 1秒后跳转到地图页
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // 页面加载后显示雾霾页
        window.addEventListener('load', () => {
            const home = document.getElementById('homePage');
            home.classList.remove('hidden');
        });
    </script>
</body>
</html>
