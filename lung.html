                   基础重置 & 全局样式 — 采用「净空计划」#0E2732 背景
                   ================================================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0E2732;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
            user-select: none;
            width: 100vw;
            height: 100vh;
        }

        /* ================================================================
                   顶部导航栏 — 完整迁移自「净空之路」页面
                   ================================================================ */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background: linear-gradient(to bottom, rgba(3, 13, 48, 0.95), rgba(3, 13, 48, 0.4));
            backdrop-filter: blur(10px);

            justify-content: center;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid rgba(40, 100, 221, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            flex-shrink: 0;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ---- 品牌标识：LOGO 图片 + 文字（flex 容器） ---- */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 500;
            color: #48EA76;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(72, 234, 118, 0.6);
            font-family: monospace;
            white-space: nowrap;
        }

        .nav-logo {
            height: 44px;
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
            display: block;
            margin-bottom: 5px;
        }


        .logo-text {
            display: inline;
            font-size: 12px;
            font-weight: inherit;
            color: inherit;
            letter-spacing: inherit;
            text-shadow: inherit;
            font-family: inherit;
            margin-left: -6px;
        }
        .logo-text-wrap {
            display: flex;
            flex-direction: column;
            justify-content: center;
       }
       /* 英文副标题样式 */
       .logo-en {
            font-size: 9px;
            color: #48EA76;
            text-shadow: 0 0 15px rgba(72, 234, 118, 0.6);
            letter-spacing: 1px;
            font-family: monospace;
            margin-top: 3px;
        }

        nav {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            color: #8fa1cc;
            text-decoration: none;
            padding: 6px 18px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            white-space: nowrap;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #48EA76;
            transition: all 0.3s;
        }

        nav a:hover::after,
        nav a.active::after {
            width: 80%;
            left: 10%;
        }

        nav a.active,
        nav a:hover {
            color: #48EA76;
            text-shadow: 0 0 10px rgba(72, 234, 118, 0.3);
            background: rgba(72, 234, 118, 0.05);
        }

        /* ================================================================
                    左右图表面板 — 替换为「净空计划」卡片风格，top 值下移避开导航栏
                   ================================================================ */
        .chart-panel {
            width: 25vw;
            height: 76vh;
            position: absolute;
            top: calc(44px + 12vh);
            background: rgba(14, 39, 49, 0.85);
            border: 1px solid rgba(40, 100, 221, 0.4);
            box-shadow: inset 0 0 14px rgba(40, 100, 221, 0.15), 0 10px 15px rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            box-sizing: border-box;
            padding: 15px 10px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(6px);
            transition: border 0.3s ease;
            overflow: hidden;
        }
        .chart-panel:hover {
            border-color: rgba(40, 100, 221, 0.8);
        }

            left: 24px;
        }
        #right-panel {
            right: 24px;
        }

        .chart-container {
            flex: 1;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        /* ================================================================
                    角落装饰 — 完全复刻「净空计划」box-corner
                   ================================================================ */
        .box-corner {
            position: absolute;
            width: 14px;
            height: 14px;
            z-index: 5;
            pointer-events: none;
        }
        .lt {
            border-left: 3px solid #2864DD;
            border-top: 3px solid #2864DD;
            top: -2px;
            left: -2px;
        }
        .rt {
            border-right: 3px solid #FCE801;
            border-top: 3px solid #FCE801;
            top: -2px;
            right: -2px;
        }
        .lb {
            border-left: 3px solid #48EA76;
            border-bottom: 3px solid #48EA76;
            bottom: -2px;
            left: -2px;
        }
        .rb {
            border-right: 3px solid #2864DD;
            border-bottom: 3px solid #2864DD;
            bottom: -2px;
            right: -2px;
        }

                    中间 3D 容器
                   ================================================================ */

            flex: 1;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;

                    3D 场景悬浮词条 — 颜色微调以适配新背景，top 值下移避开导航栏

        // ================================================================
        // 加载 OBJ 模型
        // ================================================================
        function loadOBJModel(url) {
            const loader = new THREE.OBJLoader();
            loader.load(
                url,
                function(obj) {
                    let allVertices = [];
                    obj.traverse(function(child) {
                        if (child.isMesh) {
                            const geom = child.geometry;
                            if (geom && geom.attributes.position) {
                                const pos = geom.attributes.position;
                                for (let i = 0; i < pos.count; i++) {
                                    allVertices.push(pos.getX(i), pos.getY(i), pos.getZ(i));
                                }
                            }
                        }
                    });

                    if (allVertices.length === 0) {
                        console.error("错误：未能从该 OBJ 模型中提取到任何有效的顶点数据！");
                        document.getElementById('loading').innerHTML = '模型解析失败！';
                        return;
                    }

                    document.getElementById('loading').style.display = 'none';

                    const tempGeo = new THREE.BufferGeometry();
                    tempGeo.setAttribute('position', new THREE.Float32BufferAttribute(allVertices, 3));
                    tempGeo.center();
                    tempGeo.computeBoundingBox();

                    const boundingBox = tempGeo.boundingBox;
                    const size = new THREE.Vector3();
                    boundingBox.getSize(size);
                    const maxDim = Math.max(size.x, size.y, size.z);

                    const thresholdX = size.x * 0.15;
                    const thresholdZ = size.z * 0.15;

                    const totalPointsCount = allVertices.length / 3;
                    let step = 4;
                    if (totalPointsCount > 30000) step = 8;
                    if (totalPointsCount > 100000) step = 15;
                    if (totalPointsCount > 300000) step = 30;

                    const finalPositions = [];
                    const randomsArr = [];

                    for (let i = 0; i < allVertices.length; i += (step * 3)) {
                        let vx = allVertices[i];
                        let vy = allVertices[i + 1];
                        let vz = allVertices[i + 2];

                        finalPositions.push(vx, vy, vz);

                        let r1 = Math.random() - 0.5;
                        let r2 = Math.random() - 0.5;
                        let r3 = 0.0;

                        if (Math.abs(vx) < thresholdX && Math.abs(vz) < thresholdZ) {
                            if (vy > (boundingBox.max.y * 0.1)) { r3 = 2.0; } else { r3 = 1.0; }
                        } else {
                            r3 = Math.random() < 0.12 ? 1.0 : 0.0;
                        }
                        randomsArr.push(r1, r2, r3);
                    }

                    const geometry = new THREE.BufferGeometry();
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(finalPositions, 3));
                    geometry.setAttribute('aRandom', new THREE.Float32BufferAttribute(randomsArr, 3));
                    geometry.center();

                    const material = new THREE.ShaderMaterial({
                        uniforms: {
                            uTime: { value: 0 },
                            uTransition: transitionUniform,
                            uBaseColor: { value: new THREE.Color('#C4C6F1') },
                            uVesselColor: { value: new THREE.Color('#4E5285') },
                            uOrangeColor: { value: new THREE.Color('#FF6B4A') }
                        },
                        vertexShader: `
                                uniform float uTime;
                                uniform float uTransition;
                                attribute vec3 aRandom;
                                varying vec3 vPosition;
                                varying float vVesselType;

                                void main() {
                                    vPosition = position;
                                    vVesselType = aRandom.z;
                                    vec3 transformed = position;

                                    float breath = sin(uTime * 2.0) * 0.5 + 0.5;
                                    float expandFactor = length(transformed.xz) * 0.04;
                                    if(vVesselType > 1.5) expandFactor *= 0.1;

                                    transformed.x += transformed.x * expandFactor * breath * 0.4;
                                    transformed.z += transformed.z * expandFactor * breath * 0.4;
                                    transformed.y += breath * 0.03 * transformed.y;

                                    transformed.x += sin(uTime * 4.0 + aRandom.x * 100.0) * 0.015;
                                    transformed.y += cos(uTime * 4.0 + aRandom.y * 100.0) * 0.015;

                                    float explodeDist = uTransition * 0.2;
                                    transformed.x += aRandom.x * explodeDist;
                                    transformed.y += aRandom.y * explodeDist;
                                    transformed.z += (aRandom.x + aRandom.y) * explodeDist;

                                    vec4 mvPosition = modelViewMatrix * vec4(transformed, 1.0);
                                    gl_Position = projectionMatrix * mvPosition;

                                    gl_PointSize = (10.0 / -mvPosition.z) * (1.5 + breath * 0.5);
                                }
                            `,
                        fragmentShader: `
                                uniform vec3 uBaseColor;
                                uniform vec3 uVesselColor;
                                uniform vec3 uOrangeColor;
                                varying vec3 vPosition;
                                varying float vVesselType;

                                void main() {
                                    float dist = distance(gl_PointCoord, vec2(0.5));
                                    if (dist > 0.5) discard;
                                    float alpha = smoothstep(0.5, 0.1, dist) * 0.8;

                                    vec3 finalColor = uBaseColor;
                                    if (vVesselType > 0.5) {
                                        finalColor = uVesselColor;
                                        if (vVesselType > 1.5) {
                                            finalColor = mix(finalColor, uOrangeColor, 0.6);
                                        }
                                    } else {
                                        finalColor = mix(uBaseColor, uBaseColor * 0.7, smoothstep(-2.0, 2.0, vPosition.y));
                                    }
                                    gl_FragColor = vec4(finalColor, alpha);
                                }
                            `,
                        transparent: true,
                        depthWrite: false,
                        blending: THREE.AdditiveBlending
                    });

                    lungParticles = new THREE.Points(geometry, material);
                    const targetScale = 5.5 / maxDim;
                    lungParticles.scale.set(targetScale, targetScale, targetScale);
                    scene.add(lungParticles);
                },
                function(xhr) {
                    if (xhr.total > 0) {
                        let percent = Math.round((xhr.loaded / xhr.total) * 100);
                        document.getElementById('loading').innerText = `正在加载并精简模型粒子：${percent}%`;
                    }
                },
                function(error) { console.error('模型加载失败', error); }
            );
        }

        // ================================================================
        // Tab 切换
        // ================================================================
        function switchTab(index) {
            currentTab = index;
            lastClickedTag = { tab: -1, data: -1 };

            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach((btn, i) => i === index ? btn.classList.add('active') : btn.classList.remove('active'));

            document.getElementById('info-display').classList.remove('show');

            const tags = document.querySelectorAll('.data-tag');
            tags.forEach(tag => tag.style.display = 'none');

            if (controls) {
                new TWEEN.Tween(camera.position)
                    .to({ x: initialCameraPos.x, y: initialCameraPos.y, z: initialCameraPos.z }, 800)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();

                new TWEEN.Tween(controls.target)
                    .to({ x: initialTargetPos.x, y: initialTargetPos.y, z: initialTargetPos.z }, 800)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
            }

            if (lungParticles) {
                new TWEEN.Tween(transitionUniform)
                    .to({ value: 1.0 }, 400)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onComplete(() => {
                        new TWEEN.Tween(transitionUniform)
                            .to({ value: 0.0 }, 500)
                            .easing(TWEEN.Easing.Quadratic.In)
                            .onComplete(() => {
                                tags.forEach(tag => {
                                    if (parseInt(tag.getAttribute('data-tab')) === index) {
                                        tag.style.display = 'block';
                                    }
                                });
                            })
                            .start();
                    })
                    .start();
            } else {
                tags.forEach(tag => {
                    if (parseInt(tag.getAttribute('data-tab')) === index) tag.style.display = 'block';
                });
            }
        }

        // ================================================================
        // 信息展示
        // ================================================================
        function showInfoByIndex(tabIndex, dataIndex) {
            const panel = document.getElementById('info-display');

            if (lastClickedTag.tab === tabIndex && lastClickedTag.data === dataIndex) {
                panel.classList.remove('show');
                lastClickedTag = { tab: -1, data: -1 };
                return;
            }

            lastClickedTag = { tab: tabIndex, data: dataIndex };

            const item = dataSet[tabIndex][dataIndex];
            document.getElementById('info-title').innerText = item.name;

            const value = document.getElementById('info-value');
            value.innerText = item.value;
            document.getElementById('info-desc').innerText = item.desc || "暂无相关详细说明。";

            const sub = document.getElementById('info-sub');
            sub.innerText = item.sub || "";

            value.style.fontSize = "16px";
            if (tabIndex === 2) {
                value.style.color = "#ff6b4a";
            } else {
                value.style.color = "#ffb74d";
            }

            panel.classList.remove('show');
            void panel.offsetWidth;
            panel.classList.add('show');
        }

        // ================================================================
        // 动画循环
        // ================================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            TWEEN.update();
            if (controls) controls.update();
            if (lungParticles && lungParticles.material.uniforms) {
                lungParticles.material.uniforms.uTime.value = elapsedTime;
            }
            renderer.render(scene, camera);
        }

        // ================================================================
        // 窗口自适应
        // ================================================================
        function onWindowResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);

            if (leftChart) leftChart.resize();
            if (rightChart) rightChart.resize();
        }

        window.onload = init;
    </script>
</body>
</html>
